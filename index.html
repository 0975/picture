
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片先打散后隐写系统 (Cloudflare 云端拦截版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            body { padding: 15px 10px; }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .preview-box {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            min-height: 250px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }
        canvas, img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            pointer-events: none; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        .info-log {
            background: #2c3e50;
            color: #2ecc71;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 15px;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
        }
        input[type="file"] { display: none; }
        .file-label {
            display: block;
            text-align: center;
            background: #e67e22;
            color: white;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 手机端适配：批量新样式 */
        .batch-card {
            grid-column: 1 / -1; 
            background: #ffffff;
            border: 2px solid #3498db;
        }
        .batch-preview-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .batch-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .batch-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .batch-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        /* 拦截提示的专属酷炫样式 */
        .warning-text {
            color: #e74c3c;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            animation: shake 0.5s ease-in-out infinite alternate;
        }
        @keyframes shake {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <h1>Image Scrambler (Post-Steganography)</h1>
    <p style="text-align:center; color: #7f8c8d;">逻辑重构：先打乱切片 ──► 再整体隐写 ID ──► 完美无损还原与云端鉴权</p>

    <div class="container">
        
        <div class="card batch-card">
            <h2>✨ 手机/电脑 批量无损打散</h2>
            <label for="upload-batch" class="file-label" style="background:#2980b9;">
                📁 1. 点击打开文件管理/内部存储多选照片
            </label>
            <input type="file" id="upload-batch" multiple>
            
            <div class="batch-preview-list" id="batch-preview-list" style="display: none;"></div>
            
            <div class="batch-btn-group">
                <button class="btn" id="btn-batch-scramble" style="background-color: #34495e;" disabled>
                    2. 批量打乱并缓存
                </button>
                <button class="btn btn-success" id="btn-batch-download" style="background-color: #7f8c8d;" disabled>
                    3. 批量导出到本地
                </button>
            </div>
            
            <div id="batch-log" class="info-log" style="display:none;"></div>
        </div>

        <div class="card">
            <h2>1. 打散并隐写图片</h2>
            <label for="upload-raw" class="file-label">选择原图上传</label>
            <input type="file" id="upload-raw" accept="image/*">
            
            <div class="preview-box" id="scramble-container">
                <span style="color:#95a5a6;">等待上传原图...</span>
            </div>
            
            <button class="btn" id="btn-scramble" disabled>点击打乱并埋入ID</button>
            <button class="btn btn-success" id="btn-download" style="display:none;">安全下载打散图</button>
            
            <div id="scramble-log" class="info-log" style="display:none;"></div>
        </div>

        <div class="card">
            <h2>2. 识别并逆向还原</h2>
            <label for="upload-scrambled" class="file-label" style="background:#9b59b6;">上传打散的PNG图片</label>
            <input type="file" id="upload-scrambled" accept="image/png">
            
            <div class="preview-box" id="restore-container">
                <span style="color:#95a5a6;">等待上传打散图...</span>
            </div>
            
            <button class="btn btn-success" id="btn-restore" disabled>识别水印并还原图片</button>
            <button class="btn btn-danger" id="btn-fake-download" style="display:none;">下载还原后的图片</button>
            
            <div id="restore-log" class="info-log" style="display:none;"></div>
        </div>
    </div>

<script>
    const GRID_SIZE = 64; 
    let originalImage = null;
    let finalCanvasGlobal = null;
    let restoredCanvasGlobal = null; 

    // 🚀【核心配置】请将下方换成你实际部署的 Cloudflare Worker 域名（保留最后的 / 即可）
    // 🚀 将这一行修改为你刚刚在 CF 里绑定的自定义域名
const WORKER_URL = "https://api.hopjump.cn/";

    // PRNG 伪随机发生器
    function sfc32(a, b, c, d) {
        return function() {
            a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
            var t = (a + b) | 0;
            a = b ^ (b >>> 9);
            b = (c + (c << 3)) | 0;
            c = (c << 21) | (c >>> 11);
            d = (d + 1) | 0;
            t = (t + d) | 0;
            c = (c + t) | 0;
            return (t >>> 0) / 4294967296;
        }
    }
    function createRandomPairs(seed, length) {
        let rand = sfc32(seed, 0x9E3779B9, 0x243F6A88, btoa(seed).charCodeAt(0));
        let arr = Array.from({length}, (_, i) => i);
        for (let i = length - 1; i > 0; i--) {
            const j = Math.floor(rand() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // LSB 隐写术核心
    function embedWatermark(imageData, text) {
        let textBin = "";
        for (let i = 0; i < text.length; i++) {
            textBin += text.charCodeAt(i).toString(2).padStart(8, '0');
        }
        let lenBin = textBin.length.toString(2).padStart(16, '0');
        let binaryStr = lenBin + textBin;

        let data = imageData.data;
        if (binaryStr.length > data.length / 4) {
            alert("错误：图片像素不足以容纳该长度的ID！");
            return false;
        }

        for (let i = 0; i < binaryStr.length; i++) {
            let bit = parseInt(binaryStr[i]);
            data[i * 4] = (data[i * 4] & 0xFE) | bit; 
        }
        return true;
    }

    // 复用的核心打乱与隐写逻辑
    function processScrambleCore(imgElement) {
        const blockW = Math.floor(imgElement.width / GRID_SIZE);
        const blockH = Math.floor(imgElement.height / GRID_SIZE);
        const imgWidth = blockW * GRID_SIZE;
        const imgHeight = blockH * GRID_SIZE;

        const rawCanvas = document.createElement('canvas');
        rawCanvas.width = imgWidth;
        rawCanvas.height = imgHeight;
        const rawCtx = rawCanvas.getContext('2d');
        rawCtx.drawImage(imgElement, 0, 0, imgWidth, imgHeight);

        const scrambledCanvas = document.createElement('canvas');
        scrambledCanvas.width = imgWidth;
        scrambledCanvas.height = imgHeight;
        const sCtx = scrambledCanvas.getContext('2d');

        const seed = Math.floor(Math.random() * 1000000);
        const configObject = { seed: seed, grid: GRID_SIZE };
        const scrambledID = btoa(JSON.stringify(configObject)); 

        const totalBlocks = GRID_SIZE * GRID_SIZE;
        const shuffleMap = createRandomPairs(seed, totalBlocks);

        for (let i = 0; i < totalBlocks; i++) {
            const srcIdx = i;
            const destIdx = shuffleMap[i];

            const srcX = (srcIdx % GRID_SIZE) * blockW;
            const srcY = Math.floor(srcIdx / GRID_SIZE) * blockH;
            const destX = (destIdx % GRID_SIZE) * blockW;
            const destY = Math.floor(destIdx / GRID_SIZE) * blockH;

            sCtx.drawImage(rawCanvas, srcX, srcY, blockW, blockH, destX, destY, blockW, blockH);
        }

        let scrambledImgData = sCtx.getImageData(0, 0, imgWidth, imgHeight);
        const success = embedWatermark(scrambledImgData, scrambledID);
        
        if (success) {
            sCtx.putImageData(scrambledImgData, 0, 0);
            return { canvas: scrambledCanvas, id: scrambledID };
        }
        return null;
    }

    function extractWatermark(imageData) {
        let data = imageData.data;
        let lenBin = "";
        for (let i = 0; i < 16; i++) {
            lenBin += (data[i * 4] & 1).toString();
        }
        let totalBits = parseInt(lenBin, 2);
        
        if (isNaN(totalBits) || totalBits <= 0 || totalBits > data.length / 4) {
            return null;
        }

        let textBin = "";
        for (let i = 16; i < 16 + totalBits; i++) {
            textBin += (data[i * 4] & 1).toString();
        }

        let result = "";
        for (let i = 0; i < textBin.length; i += 8) {
            let byte = textBin.substr(i, 8);
            result += String.fromCharCode(parseInt(byte, 2));
        }
        return result;
    }

    function preventSteal(element) {
        element.addEventListener('contextmenu', e => e.preventDefault());
        element.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    }

    // 1. 单张打散与隐写
    document.getElementById('upload-raw').addEventListener('change', function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            originalImage = new Image();
            originalImage.onload = function() {
                const container = document.getElementById('scramble-container');
                container.innerHTML = '';
                container.appendChild(originalImage);
                document.getElementById('btn-scramble').disabled = false;
            }
            originalImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    document.getElementById('btn-scramble').addEventListener('click', function() {
        if (!originalImage) return;
        
        const result = processScrambleCore(originalImage);
        if (result) {
            const container = document.getElementById('scramble-container');
            container.innerHTML = '';
            container.appendChild(result.canvas);
            preventSteal(result.canvas);

            finalCanvasGlobal = result.canvas;

            const logBox = document.getElementById('scramble-log');
            logBox.style.display = 'block';
            logBox.innerHTML = `处理成功！<br>1. 图片切块已完成打乱<br>2. 完整加密ID已隐写覆盖至打散图中<br>ID: ${result.id}`;

            document.getElementById('btn-download').style.display = 'block';
        }
    });

    document.getElementById('btn-download').addEventListener('click', function() {
        if (!finalCanvasGlobal) return;
        const dataUrl = finalCanvasGlobal.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `secure_scrambled_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });


    // 2. 识别并逆向还原 (对接 Cloudflare 鉴权)
    let scrambledImageForRestore = null;

    document.getElementById('upload-scrambled').addEventListener('change', function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            scrambledImageForRestore = new Image();
            scrambledImageForRestore.onload = function() {
                const container = document.getElementById('restore-container');
                container.innerHTML = '';
                container.appendChild(scrambledImageForRestore);
                preventSteal(scrambledImageForRestore);
                document.getElementById('btn-restore').disabled = false;
                document.getElementById('btn-fake-download').style.display = 'none'; 
            }
            scrambledImageForRestore.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    document.getElementById('btn-restore').addEventListener('click', async function() {
        if (!scrambledImageForRestore) return;

        const w = scrambledImageForRestore.width;
        const h = scrambledImageForRestore.height;

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(scrambledImageForRestore, 0, 0);

        const imgData = ctx.getImageData(0, 0, w, h);
        const extractedID = extractWatermark(imgData);

        const logBox = document.getElementById('restore-log');
        const container = document.getElementById('restore-container');
        logBox.style.display = 'block';

        if (!extractedID) {
            logBox.innerHTML = "<span style='color:#e74c3c;'>解密失败：未在图片头部检测到完整的隐写数据。</span>";
            return;
        }

        logBox.innerHTML = "📡 正在向 Cloudflare 数据库验证特征凭证...";

        try {
            // 组装带参数的 GET 请求 URL
            const finalRequestUrl = `${WORKER_URL}?id=${encodeURIComponent(extractedID)}`;
            const response = await fetch(finalRequestUrl, { method: "GET" });

            if (!response.ok) {
                throw new Error(`Cloudflare 响应异常，状态码: ${response.status}`);
            }

            const resData = await response.json();

            // =================== Cloudflare 云端查重查获 ===================
            if (resData.exists === true) {
                // 1. 彻底清空预览框内的旧图片数据
                container.innerHTML = '';
                
                // 2. 在预览框内直接建立文本节点显示嘲讽
                const warningDiv = document.createElement('div');
                warningDiv.className = 'warning-text';
                warningDiv.innerHTML = "💥 你已经看过一次还想看第二次？！<br>杂鱼~ 💨";
                container.appendChild(warningDiv);

                // 3. 状态日志框同步更新，并封锁下载按钮
                logBox.innerHTML = "<span style='color:#e74c3c; font-weight:bold;'>【云端同步拦截】检测到重复访问！解密行为已被强行终止。</span>";
                document.getElementById('btn-fake-download').style.display = 'none';
                return; 
            }

            // 首次解码成功，放行执行还原
            logBox.innerHTML = `[首次解锁成功] 凭证已录入云端。获取种子密码中...<br>正在执行逆向矩阵还原...`;

            const config = JSON.parse(atob(extractedID));
            const restoreCanvas = document.createElement('canvas');
            restoreCanvas.width = w;
            restoreCanvas.height = h;
            const rCtx = restoreCanvas.getContext('2d');

            const blockW = Math.floor(w / config.grid);
            const blockH = Math.floor(h / config.grid);
            const totalBlocks = config.grid * config.grid;

            const shuffleMap = createRandomPairs(config.seed, totalBlocks);

            for (let i = 0; i < totalBlocks; i++) {
                const srcIdx = i; 
                const destIdx = shuffleMap[i]; 

                const srcX = (srcIdx % config.grid) * blockW;
                const srcY = Math.floor(srcIdx / config.grid) * blockH;
                const destX = (destIdx % config.grid) * blockW;
                const destY = Math.floor(destIdx / config.grid) * blockH;

                rCtx.drawImage(canvas, destX, destY, blockW, blockH, srcX, srcY, blockW, blockH);
            }

            container.innerHTML = '';
            container.appendChild(restoreCanvas);
            preventSteal(restoreCanvas);
            
            restoredCanvasGlobal = restoreCanvas; 

            logBox.innerHTML += "<br><span style='color:#2ecc71;'>恭喜！图片已完美逆向还原。</span>";
            document.getElementById('btn-fake-download').style.display = 'block'; 

        } catch(err) {
            logBox.innerHTML = `<span style='color:#e74c3c;'>云端鉴权失败：无法连接到伪后端。原因: ${err.message}</span>`;
            console.error(err);
        }
    });

    document.getElementById('btn-fake-download').addEventListener('click', function() {
        if (!restoredCanvasGlobal) return;

        const w = restoredCanvasGlobal.width;
        const h = restoredCanvasGlobal.height;

        const destroyCanvas = document.createElement('canvas');
        destroyCanvas.width = w;
        destroyCanvas.height = h;
        const dCtx = destroyCanvas.getContext('2d');

        dCtx.drawImage(restoredCanvasGlobal, 0, 0);
        const imgData = dCtx.getImageData(0, 0, w, h);
        const data = imgData.data;

        for (let y = 0; y < h; y++) {
            const shift = Math.floor(Math.sin(y / 10) * 30 + (Math.random() - 0.5) * 20);
            if (shift !== 0) {
                const rowStart = y * w * 4;
                const rowBuffer = new Uint8ClampedArray(data.buffer, rowStart, w * 4).slice();
                for (let x = 0; x < w; x++) {
                    const targetX = (x + shift + w) % w;
                    data[rowStart + targetX * 4]     = rowBuffer[x * 4];
                    data[rowStart + targetX * 4 + 1] = rowBuffer[x * 4 + 1];
                    data[rowStart + targetX * 4 + 2] = rowBuffer[x * 4 + 2];
                }
            }
        }
        dCtx.putImageData(imgData, 0, 0);

        const fontSize = Math.max(24, Math.floor(w / 12)); 
        dCtx.font = `bold ${fontSize}px sans-serif`;
        dCtx.fillStyle = '#ff0000';
        dCtx.textAlign = 'center';
        dCtx.textBaseline = 'middle';
        
        dCtx.strokeStyle = '#ffffff';
        dCtx.lineWidth = Math.max(4, fontSize / 8);
        dCtx.strokeText("不许下载！！！", w / 2, h / 2);
        dCtx.fillText("不许下载！！！", w / 2, h / 2);

        const container = document.getElementById('restore-container');
        container.innerHTML = '';
        container.appendChild(destroyCanvas);

        const dataUrl = destroyCanvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `DONT_STEAL_IMAGE_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        const logBox = document.getElementById('restore-log');
        logBox.innerHTML = "<span style='color:#e74c3c; font-size:16px; font-weight:bold;'>警告：触发防盗机制！已对下载资源执行结构化毁灭，并盖戳：不许下载！！！</span>";
    });


    // =================== 批量处理内存逻辑 ===================
    let batchFiles = [];
    let processedCache = []; 

    document.getElementById('upload-batch').addEventListener('change', function(e) {
        const originalFiles = Array.from(e.target.files);
        if (originalFiles.length === 0) return;

        batchFiles = originalFiles.filter(file => file.type.startsWith('image/'));

        if (batchFiles.length === 0) {
            alert("未在选中的文件中检测到有效图片格式！请重新选择。");
            return;
        }

        processedCache = [];
        document.getElementById('btn-batch-download').disabled = true;
        document.getElementById('btn-batch-download').style.backgroundColor = '#7f8c8d';
        document.getElementById('btn-batch-download').innerText = "3. 批量导出到本地";

        const previewListContainer = document.getElementById('batch-preview-list');
        previewListContainer.innerHTML = '';
        previewListContainer.style.display = 'grid';

        batchFiles.forEach((file) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const div = document.createElement('div');
                div.className = 'batch-preview-item';
                const img = document.createElement('img');
                img.src = event.target.result;
                div.appendChild(img);
                previewListContainer.appendChild(div);
            }
            reader.readAsDataURL(file);
        });

        const btnScramble = document.getElementById('btn-batch-scramble');
        btnScramble.disabled = false;
        btnScramble.style.backgroundColor = '#3498db';
        btnScramble.innerText = `2. 批量打乱 (${batchFiles.length}张)`;
        
        const logBox = document.getElementById('batch-log');
        logBox.style.display = 'block';
        logBox.innerHTML = `已载入 ${batchFiles.length} 张照片。请点击“批量打乱并缓存”开始。`;
    });

    document.getElementById('btn-batch-scramble').addEventListener('click', async function() {
        if (batchFiles.length === 0) return;

        const logBox = document.getElementById('batch-log');
        logBox.innerHTML = "正在高速处理打散中，请勿关闭页面...";
        
        processedCache = []; 
        let successCount = 0;

        for (let i = 0; i < batchFiles.length; i++) {
            const file = batchFiles[i];
            logBox.innerHTML = `处理进度: (${i + 1}/${batchFiles.length}) 正在无损混淆 ${file.name}...`;
            
            try {
                const img = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        const image = new Image();
                        image.onload = () => resolve(image);
                        image.onerror = reject;
                        image.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                const result = processScrambleCore(img);
                
                if (result) {
                    const dataUrl = result.canvas.toDataURL('image/png');
                    const cleanName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    
                    processedCache.push({
                        dataUrl: dataUrl,
                        filename: `scrambled_${cleanName}.png`
                    });
                    successCount++;
                }
            } catch (err) {
                console.error(err);
                logBox.innerHTML += `<br><span style='color:#e74c3c;'>文件 ${file.name} 转换失败，已跳过。</span>`;
            }
        }

        if (successCount > 0) {
            logBox.innerHTML = `✨ 批量混淆完成！已安全缓存 <b>${successCount}</b> 张无损图到内存中。<br>请点击右侧的<b>“批量导出到本地”</b>将其保存到手机。`;
            
            const btnDownload = document.getElementById('btn-batch-download');
            btnDownload.disabled = false;
            btnDownload.style.backgroundColor = '#2ecc71';
            btnDownload.innerText = `3. 批量导出 (${successCount}张)`;
        } else {
            logBox.innerHTML = "<span style='color:#e74c3c;'>处理完毕，未能成功混淆任何图片。</span>";
        }
    });

    document.getElementById('btn-batch-download').addEventListener('click', function() {
        if (processedCache.length === 0) return;

        const logBox = document.getElementById('batch-log');
        logBox.innerHTML = "正在通过浏览器原生安全通道依次下载图片...";

        processedCache.forEach((item, index) => {
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = item.dataUrl;
                a.download = item.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                logBox.innerHTML = `正在保存第 (${index + 1}/${processedCache.length}) 张图片...`;

                if (index === processedCache.length - 1) {
                    logBox.innerHTML = `🎉 批量无损导出成功！所有图片已依次通过系统原生通道保存。<br>内存缓存已全部清空，避免占用手机内存。`;
                    
                    processedCache = [];
                    batchFiles = [];
                    document.getElementById('btn-batch-download').disabled = true;
                    document.getElementById('btn-batch-download').style.backgroundColor = '#7f8c8d';
                    document.getElementById('btn-batch-download').innerText = "3. 批量导出到本地";
                    document.getElementById('btn-batch-scramble').disabled = true;
                    document.getElementById('btn-batch-scramble').innerText = "2. 批量打乱并缓存";
                    document.getElementById('batch-preview-list').style.display = 'none';
                    document.getElementById('batch-preview-list').innerHTML = '';
                }
            }, index * 400); 
        });
    });

    preventSteal(document.getElementById('scramble-container'));
    preventSteal(document.getElementById('restore-container'));
</script>
</body>
</html>
